<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ampullarium Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0e1117;color:#e8eaf0;font-family:'Courier New',monospace;font-size:14px}
input,select,button{font-family:'Courier New',monospace}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#2c3650;border-radius:3px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;background:#0e1117}
.login-box{background:#161b27;border:1px solid #2c3650;border-radius:10px;padding:40px;width:100%;max-width:400px}
.login-title{font-size:24px;font-weight:800;margin-bottom:4px}
.login-sub{font-size:12px;color:#8892a4;margin-bottom:24px}
.info-box{background:rgba(74,158,255,.12);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#4a9eff;line-height:1.6}
.err-box{background:rgba(224,62,64,.14);border-radius:6px;padding:9px 13px;margin-bottom:14px;font-size:12px;color:#e03e40}
.app{display:flex;min-height:100vh}
.sidebar{width:200px;min-height:100vh;background:#161b27;border-right:1px solid #2c3650;display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:20px 16px;border-bottom:1px solid #2c3650}
.sb-title{font-size:18px;font-weight:800}
.sb-sub{font-size:9px;color:#8892a4;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.sb-nav{flex:1;padding:12px 8px}
.sb-foot{padding:14px 8px;border-top:1px solid #2c3650}
.main{flex:1;padding:24px;overflow-x:auto;background:#0e1117}
.page-title{font-size:24px;font-weight:800;margin-bottom:18px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:#161b27;border:1px solid #2c3650;border-radius:10px;padding:18px}
.stat-lbl{font-size:11px;color:#8892a4;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.stat-val{font-size:34px;font-weight:800}
.amp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.amp-card{background:#161b27;border:1px solid #2c3650;border-radius:10px;padding:20px;cursor:pointer}
.amp-card:hover{border-color:#e03e40}
.amp-name{font-size:17px;font-weight:800;margin-bottom:3px}
.amp-desc{font-size:11px;color:#8892a4;margin-bottom:14px}
.warn-list{background:#161b27;border:1px solid #2c3650;border-radius:10px;overflow:hidden}
.warn-head{padding:12px 18px;border-bottom:1px solid #2c3650;font-size:13px;font-weight:700}
.warn-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px}
.tbl-wrap{background:#161b27;border:1px solid #2c3650;border-radius:10px;overflow:hidden}
.tbl-inner{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:11px 16px;text-align:left;font-size:11px;color:#8892a4;text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap;background:#1d2436;border-bottom:1px solid #2c3650}
tbody tr{border-bottom:1px solid #2c3650}
tbody tr:last-child{border-bottom:none}
td{padding:11px 16px;vertical-align:middle}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-box{background:#161b27;border:1px solid #2c3650;border-radius:10px;padding:24px;width:100%;max-width:480px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:18px;font-weight:800}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;color:#8892a4;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:700}
.back-btn{background:none;border:none;cursor:pointer;color:#8892a4;font-size:12px;margin-bottom:14px;padding:0;font-family:inherit}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.nav-btn{display:flex;align-items:center;width:100%;padding:10px 12px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:inherit;text-align:left;margin-bottom:2px}
.saving{font-size:11px;color:#4a5568;text-align:center;margin-bottom:8px}
.empty{text-align:center;padding:3rem;color:#4a5568}
.hint-row{display:flex;gap:18px;margin-bottom:14px}
.hint-num{font-size:26px;font-weight:800}
.hint-lbl{font-size:10px;color:#4a5568}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
var FIREBASE_URL = "https://brked-medis-default-rtdb.europe-west1.firebasedatabase.app";
var DB_URL = FIREBASE_URL + "/ampullarium.json";
var DEFAULT = { vp: btoa("rettung"), ap: btoa("admin2025"), zl: [], amps: [] };

var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;

function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function hp(s){ try{ return btoa(unescape(encodeURIComponent(s))); }catch(x){ return btoa(s); } }

function loadData(){
  return fetch(DB_URL)
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(d){ return (d && d.vp) ? d : DEFAULT; })
    .catch(function(){ return DEFAULT; });
}
function saveData(d){
  return fetch(DB_URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); });
}

function expiryStatus(ym){
  if(!ym) return null;
  var diff = Math.floor((new Date(ym+"-01")-new Date())/864e5);
  return diff<0?"danger":diff<30?"danger":diff<90?"warning":"success";
}

// ─── UI HELPERS ───
function badge(type, text){
  var colors = {
    danger:{bg:"rgba(224,62,64,.14)",c:"#e03e40"},
    warning:{bg:"rgba(244,180,0,.12)",c:"#f4b400"},
    success:{bg:"rgba(46,196,182,.12)",c:"#2ec4b6"},
    info:{bg:"rgba(74,158,255,.12)",c:"#4a9eff"}
  };
  var s = colors[type]||colors.info;
  return e("span",{style:{background:s.bg,color:s.c,padding:"3px 9px",borderRadius:100,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}},text);
}

function expiryBadge(ym){
  if(!ym) return e("span",{style:{color:"#4a5568"}},"--");
  var diff = Math.floor((new Date(ym+"-01")-new Date())/864e5);
  var lbl = diff<0?"Abgelaufen":diff<30?(diff+"d"):ym;
  return badge(expiryStatus(ym)||"success", lbl);
}

function stockBadge(cur,req){
  var c=cur||0,r=req||0;
  var t=c===0?"danger":(r>0&&c/r<0.5)?"warning":"success";
  return badge(t, c+"/"+r);
}

function btn(text, onClick, opts){
  opts = opts||{};
  var v = opts.v||"sec";
  var styles = {
    pri:{background:"#e03e40",color:"#fff",border:"none"},
    sec:{background:"#1d2436",color:"#e8eaf0",border:"1px solid #2c3650"},
    grn:{background:"rgba(46,196,182,.12)",color:"#2ec4b6",border:"1px solid rgba(46,196,182,.3)"},
    dan:{background:"rgba(224,62,64,.14)",color:"#e03e40",border:"1px solid rgba(224,62,64,.3)"},
    gho:{background:"transparent",color:"#8892a4",border:"1px solid #2c3650"},
  };
  var s = styles[v]||styles.sec;
  return e("button",{
    onClick:onClick, disabled:opts.disabled||false,
    style:Object.assign({display:"inline-flex",alignItems:"center",gap:6,fontFamily:"inherit",fontWeight:700,
      borderRadius:"6px",cursor:opts.disabled?"not-allowed":"pointer",whiteSpace:"nowrap",
      padding:opts.sm?"5px 11px":"9px 16px",fontSize:opts.sm?11:13,opacity:opts.disabled?0.45:1,
      width:opts.full?"100%":"auto",justifyContent:opts.full?"center":"flex-start"},s)
  }, text);
}

function inp(label, value, onChange, type, placeholder){
  return e("div",{className:"form-group"},
    label && e("label",{className:"form-label"},label),
    e("input",{
      type:type||"text", value:value, placeholder:placeholder||"",
      onChange:function(ev){onChange(ev.target.value);},
      style:{width:"100%",padding:"10px 12px",fontSize:13,borderRadius:"6px",border:"1px solid #2c3650",background:"#1d2436",color:"#e8eaf0",outline:"none"}
    })
  );
}

function selct(label, value, onChange, options){
  return e("div",{className:"form-group"},
    label && e("label",{className:"form-label"},label),
    e("select",{value:value, onChange:function(ev){onChange(ev.target.value);},
      style:{width:"100%",padding:"10px 12px",fontSize:13,borderRadius:"6px",border:"1px solid #2c3650",background:"#1d2436",color:"#e8eaf0",outline:"none",appearance:"none"}},
      options.map(function(o){ return e("option",{key:o.v,value:o.v},o.l); })
    )
  );
}

function Modal(props){
  return e("div",{className:"modal-bg", onClick:function(ev){if(ev.target===ev.currentTarget)props.onClose();}},
    e("div",{className:"modal-box",style:{maxWidth:props.w||480}},
      e("div",{className:"modal-head"},
        e("span",{className:"modal-title"},props.title),
        e("button",{onClick:props.onClose,style:{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#8892a4",padding:"2px 6px"}},"X")
      ),
      props.children
    )
  );
}

// ─── FORMS ───
function ZlForm(props){
  var def={name:"",dosage:"",unit:"Ampulle",quantity:0,minStock:5,expiry:"",notes:""};
  var s = useState(Object.assign({},def,props.init||{}));
  var f=s[0], setF=s[1];
  function u(k,v){setF(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  return e("div",null,
    inp("Name *",f.name,function(v){u("name",v);}),
    inp("Dosierung (z.B. 1 mg/ml)",f.dosage,function(v){u("dosage",v);}),
    inp("Einheit",f.unit,function(v){u("unit",v);}),
    e("div",{className:"form-row"},
      inp("Bestand",f.quantity,function(v){u("quantity",parseInt(v)||0);},"number"),
      inp("Mindestbestand",f.minStock,function(v){u("minStock",parseInt(v)||0);},"number")
    ),
    inp("Verfall (JJJJ-MM)",f.expiry,function(v){u("expiry",v);},"text","2026-12"),
    inp("Notizen",f.notes,function(v){u("notes",v);}),
    e("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}},
      btn("Abbrechen",props.onCancel,{v:"gho"}),
      btn("Speichern",function(){if(f.name)props.onSave(f);},{v:"pri"})
    )
  );
}

function AmpForm(props){
  var s=useState(Object.assign({name:"",description:""},props.init||{}));
  var f=s[0],setF=s[1];
  return e("div",null,
    inp("Name (z.B. RTW 1) *",f.name,function(v){setF(function(p){return Object.assign({},p,{name:v});});}),
    inp("Beschreibung",f.description,function(v){setF(function(p){return Object.assign({},p,{description:v});});}),
    e("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}},
      btn("Abbrechen",props.onCancel,{v:"gho"}),
      btn("Speichern",function(){if(f.name)props.onSave(f);},{v:"pri"})
    )
  );
}

function AmpMedForm(props){
  var def={name:"",dosage:"",unit:"Ampulle",required:1,current:0,expiry:""};
  var s=useState(Object.assign({},def,props.init||{}));
  var f=s[0],setF=s[1];
  function u(k,v){setF(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  function pick(id){
    var z=props.zl.find(function(x){return x.id===id;});
    if(z) setF(function(p){return Object.assign({},p,{name:z.name,dosage:z.dosage,unit:z.unit});});
  }
  var zlOpts=[{v:"",l:"-- Auswaehlen --"}].concat(props.zl.map(function(z){return {v:z.id,l:z.name+(z.dosage?" ("+z.dosage+")":"")};}));
  return e("div",null,
    props.zl.length>0 && selct("Aus Zentrallager uebernehmen","",pick,zlOpts),
    inp("Name *",f.name,function(v){u("name",v);}),
    inp("Dosierung",f.dosage,function(v){u("dosage",v);}),
    inp("Einheit",f.unit,function(v){u("unit",v);}),
    e("div",{className:"form-row"},
      inp("Sollbestand",f.required,function(v){u("required",parseInt(v)||0);},"number"),
      inp("Istbestand",f.current,function(v){u("current",parseInt(v)||0);},"number")
    ),
    inp("Verfall (JJJJ-MM)",f.expiry,function(v){u("expiry",v);},"text","2026-12"),
    e("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}},
      btn("Abbrechen",props.onCancel,{v:"gho"}),
      btn("Speichern",function(){if(f.name)props.onSave(f);},{v:"pri"})
    )
  );
}

function RefillForm(props){
  var init=props.amp.meds.map(function(m){return {medId:m.id,medName:m.name,cur:m.current||0,req:m.required||0,zlId:"",qty:0};});
  var s=useState(init);
  var rows=s[0],setRows=s[1];
  function upd(i,k,v){setRows(function(r){return r.map(function(x,j){if(j!==i)return x;var n=Object.assign({},x);n[k]=v;return n;});});}
  if(!props.amp.meds.length) return e("div",null,
    e("p",{className:"empty"},"Keine Medikamente"),
    e("div",{style:{textAlign:"right"}},btn("Schliessen",props.onCancel,{v:"gho"}))
  );
  var ok=rows.some(function(r){return r.qty>0&&r.zlId;});
  var zlOpts=props.zl.map(function(z){return {v:z.id,l:z.name+" ("+( z.quantity||0)+")"}; });
  return e("div",null,
    e("p",{style:{fontSize:12,color:"#8892a4",marginBottom:12}},"Quelle und Menge waehlen."),
    rows.map(function(r,i){
      return e("div",{key:r.medId,style:{background:"#1d2436",borderRadius:"6px",padding:12,marginBottom:8}},
        e("div",{style:{fontSize:13,fontWeight:700,marginBottom:7}},r.medName,
          e("span",{style:{fontWeight:400,fontSize:11,color:"#8892a4",marginLeft:8}},"Ist: "+r.cur+" / Soll: "+r.req)
        ),
        e("div",{style:{display:"flex",gap:8}},
          e("select",{value:r.zlId,onChange:function(ev){upd(i,"zlId",ev.target.value);},
            style:{flex:3,padding:"7px 9px",fontSize:12,borderRadius:"6px",border:"1px solid #2c3650",background:"#161b27",color:"#e8eaf0"}},
            e("option",{value:""},"-- Quelle --"),
            zlOpts.map(function(o){return e("option",{key:o.v,value:o.v},o.l);})
          ),
          e("input",{type:"number",min:0,value:r.qty,onChange:function(ev){upd(i,"qty",parseInt(ev.target.value)||0);},placeholder:"Menge",
            style:{flex:1,padding:"7px 9px",fontSize:12,borderRadius:"6px",border:"1px solid #2c3650",background:"#161b27",color:"#e8eaf0"}})
        )
      );
    }),
    e("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}},
      btn("Abbrechen",props.onCancel,{v:"gho"}),
      btn("Auffuellen",function(){props.onSave(rows.filter(function(r){return r.qty>0&&r.zlId;}));},{v:"grn",disabled:!ok})
    )
  );
}

function PwForm(props){
  var s1=useState(""),s2=useState("");
  var vp=s1[0],setVp=s1[1],ap=s2[0],setAp=s2[1];
  return e("div",null,
    inp("Neues Betrachter-Passwort",vp,setVp,"password"),
    inp("Neues Admin-Passwort",ap,setAp,"password"),
    btn("Speichern",function(){props.onSave(vp,ap);},{v:"pri",disabled:!vp||!ap})
  );
}

// ─── APP ───
function App(){
  var s1=useState(true),loading=s1[0],setLoading=s1[1];
  var s2=useState(null),data=s2[0],setData=s2[1];
  var s3=useState(null),mode=s3[0],setMode=s3[1];
  var s4=useState("dashboard"),view=s4[0],setView=s4[1];
  var s5=useState(null),selAmp=s5[0],setSelAmp=s5[1];
  var s6=useState(null),modal=s6[0],setModal=s6[1];
  var s7=useState(""),pw=s7[0],setPw=s7[1];
  var s8=useState(""),pwErr=s8[0],setPwErr=s8[1];
  var s9=useState(false),firstTime=s9[0],setFirstTime=s9[1];
  var s10=useState(false),saving=s10[0],setSaving=s10[1];
  var s11=useState(null),toast=s11[0],setToast=s11[1];

  useEffect(function(){
    loadData().then(function(d){
      setData(d);
      if(!d.zl||!d.zl.length) setFirstTime(true);
      setLoading(false);
    });
  },[]);

  function showToast(msg,t){
    setToast({msg:msg,t:t||"ok"});
    setTimeout(function(){setToast(null);},3000);
  }

  function doSave(nd){
    setSaving(true);
    saveData(nd).then(function(){
      setData(nd);showToast("Gespeichert");setSaving(false);
    }).catch(function(er){
      showToast("Fehler: "+er.message,"err");setSaving(false);
    });
  }

  function login(){
    if(!data)return;
    if(hp(pw)===data.ap){setMode("admin");setPwErr("");}
    else if(hp(pw)===data.vp){setMode("viewer");setPwErr("");}
    else setPwErr("Falsches Passwort");
  }

  function addZl(item){doSave(Object.assign({},data,{zl:data.zl.concat([Object.assign({},item,{id:genId()})])}));setModal(null);}
  function editZl(id,item){doSave(Object.assign({},data,{zl:data.zl.map(function(x){return x.id===id?Object.assign({},x,item):x;})}));setModal(null);}
  function delZl(id){doSave(Object.assign({},data,{zl:data.zl.filter(function(x){return x.id!==id;})}));setModal(null);}
  function addAmp(a){doSave(Object.assign({},data,{amps:data.amps.concat([Object.assign({},a,{id:genId(),meds:[]})])}));setModal(null);}
  function editAmp(id,a){doSave(Object.assign({},data,{amps:data.amps.map(function(x){return x.id===id?Object.assign({},x,a):x;})}));setModal(null);}
  function delAmp(id){doSave(Object.assign({},data,{amps:data.amps.filter(function(x){return x.id!==id;})}));setModal(null);if(selAmp===id){setSelAmp(null);setView("ampullarien");}}
  function addMed(aid,m){doSave(Object.assign({},data,{amps:data.amps.map(function(a){return a.id===aid?Object.assign({},a,{meds:a.meds.concat([Object.assign({},m,{id:genId()})])}):a;})}));setModal(null);}
  function editMed(aid,mid,m){doSave(Object.assign({},data,{amps:data.amps.map(function(a){return a.id===aid?Object.assign({},a,{meds:a.meds.map(function(x){return x.id===mid?Object.assign({},x,m):x;})}):a;})}));setModal(null);}
  function delMed(aid,mid){doSave(Object.assign({},data,{amps:data.amps.map(function(a){return a.id===aid?Object.assign({},a,{meds:a.meds.filter(function(m){return m.id!==mid;})}):a;})}));setModal(null);}
  function refill(aid,refills){
    var nd=Object.assign({},data,{zl:data.zl.slice(),amps:data.amps.slice()});
    refills.forEach(function(r){
      nd.zl=nd.zl.map(function(z){return z.id===r.zlId?Object.assign({},z,{quantity:Math.max(0,(z.quantity||0)-r.qty)}):z;});
      nd.amps=nd.amps.map(function(a){return a.id===aid?Object.assign({},a,{meds:a.meds.map(function(m){return m.id===r.medId?Object.assign({},m,{current:(m.current||0)+r.qty}):m;})}):a;});
    });
    doSave(nd);setModal(null);showToast("Aufgefuellt");
  }
  function changePw(vp,ap){doSave(Object.assign({},data,{vp:hp(vp),ap:hp(ap)}));setModal(null);showToast("Passwoerter geaendert");}

  var warnings=[];
  if(data){
    data.zl.forEach(function(z){
      var st=expiryStatus(z.expiry);
      if(st==="danger"||st==="warning") warnings.push({t:st,msg:"ZL: "+z.name+" - Verfall "+z.expiry});
      if(z.minStock&&(z.quantity||0)<z.minStock) warnings.push({t:"warning",msg:"ZL: "+z.name+" - Bestand niedrig"});
    });
    data.amps.forEach(function(a){
      a.meds.forEach(function(m){
        var st=expiryStatus(m.expiry);
        if(st==="danger"||st==="warning") warnings.push({t:st,msg:a.name+": "+m.name+" - Verfall "+m.expiry});
        if((m.current||0)<(m.required||0)) warnings.push({t:(m.current||0)===0?"danger":"warning",msg:a.name+": "+m.name+" - "+(m.current||0)+"/"+(m.required||0)});
      });
    });
  }

  // LOADING
  if(loading) return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"#8892a4",fontSize:13}},"Lade Daten...");

  // LOGIN
  if(!mode) return e("div",{className:"login-wrap"},
    e("div",{className:"login-box"},
      e("div",{className:"login-title"},"Ampullarium Manager"),
      e("div",{className:"login-sub"},"Medikamentenverwaltung"),
      firstTime && e("div",{className:"info-box"},
